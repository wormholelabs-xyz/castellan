name: Release

on:
  push:
    tags: ["v*"]

permissions: read-all

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact_name: linux-aarch64
          - target: x86_64-unknown-linux-musl
            artifact_name: linux-x86_64-musl
          - target: aarch64-unknown-linux-musl
            artifact_name: linux-aarch64-musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - run: |
          rustup toolchain install 1.96.0 --target ${{ matrix.target }} --no-self-update
          rustup default 1.96.0

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 29d00c7803f221f1b3f35e561b03792368fb8339

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/castellan artifacts/

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: castellan-${{ matrix.artifact_name }}
          path: artifacts/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts/

      - name: Create tarballs
        run: |
          cd artifacts/castellan-linux-x86_64
          tar czf ../castellan-linux-x86_64.tar.gz castellan
          cd ../castellan-linux-aarch64
          tar czf ../castellan-linux-aarch64.tar.gz castellan
          cd ../castellan-linux-x86_64-musl
          tar czf ../castellan-linux-x86_64-musl.tar.gz castellan
          cd ../castellan-linux-aarch64-musl
          tar czf ../castellan-linux-aarch64-musl.tar.gz castellan

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/castellan-linux-x86_64.tar.gz \
            artifacts/castellan-linux-aarch64.tar.gz \
            artifacts/castellan-linux-x86_64-musl.tar.gz \
            artifacts/castellan-linux-aarch64-musl.tar.gz
